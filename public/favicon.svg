<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff69b4"/>
      <stop offset="100%" stop-color="#9966cc"/>
    </linearGradient>
    <linearGradient id="dress" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffe0f0"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b3a2a"/>
      <stop offset="100%" stop-color="#3b2214"/>
    </linearGradient>
    <radialGradient id="face" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#fdebd0"/>
      <stop offset="100%" stop-color="#e8b98d"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="28" fill="url(#bg)" opacity="0.8"/>
  <!-- Sparkle ring -->
  <circle cx="32" cy="32" r="29" fill="none" stroke="#fff" stroke-width="1" opacity="0.4"/>
  <!-- Body/Dress -->
  <path d="M24,36 L20,56 L44,56 L40,36 Z" fill="url(#dress)"/>
  <path d="M24,36 Q22,34 20,36 L18,42 L24,40 Z" fill="url(#dress)"/>
  <path d="M40,36 Q42,34 44,36 L46,42 L40,40 Z" fill="url(#dress)"/>
  <!-- Dress details -->
  <path d="M28,42 Q32,40 36,42" stroke="#ff69b4" stroke-width="0.6" fill="none" opacity="0.5"/>
  <path d="M26,48 Q32,46 38,48" stroke="#ff69b4" stroke-width="0.5" fill="none" opacity="0.4"/>
  <!-- Neck -->
  <rect x="30" y="30" width="4" height="6" rx="2" fill="#e8b98d"/>
  <!-- Head -->
  <ellipse cx="32" cy="23" rx="9" ry="11" fill="url(#face)"/>
  <!-- Hair back -->
  <path d="M23,20 C22,12 26,10 32,10 C38,10 42,12 41,20 L42,28 C42,32 40,34 38,30 L38,18 L26,18 L26,30 C24,34 22,32 22,28 Z" fill="url(#hair)"/>
  <!-- Eyes -->
  <ellipse cx="28.5" cy="22" rx="2" ry="1.6" fill="white"/>
  <ellipse cx="35.5" cy="22" rx="2" ry="1.6" fill="white"/>
  <circle cx="28.8" cy="22" r="1" fill="#4a6741"/>
  <circle cx="35.8" cy="22" r="1" fill="#4a6741"/>
  <circle cx="28.8" cy="22" r="0.5" fill="#111"/>
  <circle cx="35.8" cy="22" r="0.5" fill="#111"/>
  <!-- Catchlights -->
  <circle cx="28.3" cy="21.5" r="0.35" fill="white"/>
  <circle cx="35.3" cy="21.5" r="0.35" fill="white"/>
  <!-- Eyebrows -->
  <path d="M26,19.5 Q28.5,18 31,19.5" stroke="#3b2214" stroke-width="0.7" fill="none"/>
  <path d="M33,19.5 Q35.5,18 38,19.5" stroke="#3b2214" stroke-width="0.7" fill="none"/>
  <!-- Lips -->
  <path d="M30,27 Q31,26 32,26.5 Q33,26 34,27" fill="#c45b84"/>
  <path d="M30,27 Q32,28.5 34,27" fill="#a04870"/>
  <!-- Blush -->
  <ellipse cx="26" cy="25" rx="2" ry="1.2" fill="#ffb6c1" opacity="0.35"/>
  <ellipse cx="38" cy="25" rx="2" ry="1.2" fill="#ffb6c1" opacity="0.35"/>
  <!-- Sparkles -->
  <g fill="#fff" opacity="0.8">
    <polygon points="12,14 13,12 14,14 13,16" transform="scale(0.6) translate(6,8)"/>
    <polygon points="50,10 51,8 52,10 51,12" transform="scale(0.7) translate(18,4)"/>
    <polygon points="48,48 49,46 50,48 49,50" transform="scale(0.5) translate(40,20)"/>
  </g>
  <!-- Star accents -->
  <circle cx="14" cy="12" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="50" cy="14" r="1.2" fill="#fff" opacity="0.6"/>
  <circle cx="52" cy="48" r="0.8" fill="#fff" opacity="0.5"/>
</svg>
